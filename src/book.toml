[book]
title = "Rust via Desugarings"
description = "A book that explains the meaning of a Rust program via successive desugarings"
authors = ["Nadrieril"]
language = "en"
src = "book"

[build]
build-dir = ".book-build"

[output.html]
git-repository-url = "https://github.com/Nadrieril/rust-via-desugarings"
edit-url-template = "https://github.com/Nadrieril/rust-via-desugarings/edit/main/{path}"
site-url = "/rust-via-desugarings/"
additional-css = ["book/theme/grammar.css"]
additional-js = ["book/theme/grammar.js"]

[output.html.fold]
enable = true
level = 2

[output.linkcheck]
optional = true
warning-policy = "error"

[preprocessor.backlinks]
optional = true

[preprocessor.literate-rust]
before = [ "links" ]
command = "python3 ../tools/literate_rust.py"

[preprocessor.grammar]
after = [ "literate-rust" ]
before = [ "links" ]
command = "cargo run --quiet --manifest-path ../tools/grammar/Cargo.toml --bin mdbook-grammar"
